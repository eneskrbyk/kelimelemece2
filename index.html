<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kelimelemece!</title>
    <script src="https://unpkg.com/ml5@latest/dist/ml5.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #00d2d3;
            --primary: #6c5ce7;
            --secondary: #ff9f43;
            --hint: #ff9f43;
        }

        * { box-sizing: border-box; touch-action: none; font-family: 'Arial Rounded MT Bold', sans-serif; }
        body { margin: 0; background: var(--bg); color: #fff; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }

        .panel {
            position: fixed; inset: 0; background: var(--bg);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 1000; padding: 20px; text-align: center;
        }

        #mode-selection { display: none; background: rgba(15, 23, 42, 0.98); }
        .mode-card {
            width: 100%; max-width: 300px; background: var(--card);
            padding: 20px; margin: 10px; border-radius: 25px;
            border: 2px solid transparent; cursor: pointer; transition: 0.3s;
        }
        .mode-card:hover { border-color: var(--accent); transform: translateY(-5px); }
        .mode-card h3 { margin: 0; color: var(--accent); }
        .mode-card p { font-size: 0.8rem; color: #94a3b8; margin: 5px 0 0 0; }

        #game-container {
            width: 95%; max-width: 520px; background: var(--card);
            padding: 30px 20px; border-radius: 45px; text-align: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6); display: none; position: relative;
        }

        .home-btn {
            position: absolute; top: 20px; left: 20px;
            background: rgba(255,255,255,0.1); border: none;
            color: #fff; padding: 8px 12px; border-radius: 12px;
            cursor: pointer; font-size: 0.7rem; font-weight: bold;
        }

        .target-word { font-size: 3.5rem; font-weight: 900; color: var(--accent); margin: 0; text-transform: uppercase; letter-spacing: 2px; }
        
        .game-row {
            display: flex; flex-direction: row; justify-content: center;
            align-items: center; gap: 8px; margin: 30px 0; flex-wrap: wrap;
        }

        /* KUTULAR */
        .canvas-box, .emoji-input-box {
            background: #fff; border: 4px solid var(--primary);
            width: 150px; height: 100px; border-radius: 20px;
            position: relative; overflow: hidden; box-shadow: 0 5px 0 rgba(0,0,0,0.2);
        }
        .emoji-input-box { border-color: var(--accent); display: flex; align-items: center; justify-content: center; }
        .emoji-input-box input { width: 100%; background: transparent; border: none; text-align: center; font-size: 3.5rem; outline: none; color: #000; }

        .letter-box, .number-box {
            background: #fff; width: 60px; height: 90px;
            border-radius: 18px; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 5px 0 rgba(0,0,0,0.2);
        }
        .number-box { border: 3px solid var(--secondary); } /* Sayı kutusu vurgusu */

        .letter-box input, .number-box input {
            width: 85%; border: none; border-bottom: 3px solid var(--primary);
            text-align: center; font-size: 1.8rem; font-weight: bold; color: #2d3436; outline: none;
        }
        .number-box input { border-bottom-color: var(--secondary); color: var(--secondary); }

        .btn-check {
            width: 100%; max-width: 300px; padding: 20px; background: var(--primary); color: white;
            border: none; border-radius: 22px; font-size: 1.5rem; font-weight: 900;
            cursor: pointer; box-shadow: 0 8px 0 #4834d4;
        }

        #success-card {
            position: fixed; inset: 0; background: rgba(15, 23, 42, 0.95);
            display: none; flex-direction: column; align-items: center; justify-content: center;
            z-index: 2000;
        }
    </style>
</head>
<body>

<div id="main-menu" class="panel">
    <h1 style="color: var(--accent); font-size: 3rem; margin-bottom: 40px;">Kelimelemece!</h1>
    <button class="btn-check" onclick="showModeSelection()">OYUNA BAŞLA</button>
</div>

<div id="mode-selection" class="panel">
    <h2 style="color: #fff; margin-bottom: 30px;">Modunu Seç Canısı</h2>
    <div class="mode-card" onclick="startLevel(1)"><h3>🎨 Çizim Modu</h3><p>Eksik parçayı çiz!</p></div>
    <div class="mode-card" onclick="startLevel(2)"><h3>😍 Emoji Modu</h3><p>Emojiyi klavyenden yaz!</p></div>
    <div class="mode-card" onclick="startLevel(3)"><h3>🔢 Sayı Modu</h3><p>Harfleri sayılarla birleştir!</p></div>
    <button class="home-btn" style="position:static; margin-top:30px;" onclick="goToMenu()">⬅ Geri Dön</button>
</div>

<div id="game-container">
    <button class="home-btn" onclick="goToMenu()">🏠 Menü</button>
    <div style="display: flex; justify-content: flex-end; font-size: 0.7rem; color: var(--primary); font-weight: bold; margin-bottom: 5px;">
        <span id="status">YÜKLENİYOR...</span>
    </div>
    <div class="target-word" id="target">...</div>
    <p style="color: #94a3b8; font-weight: bold; margin: 10px 0 20px 0;">aşağıdaki kutulara bu kelimeyi sığdırabilir misin?</p>
    <div class="game-row" id="game-row"></div>
    <button class="btn-check" onclick="check()">KONTROL ET</button>
    <p id="clear-btn" style="color:#64748b; font-size:0.7rem; margin-top:15px; cursor:pointer;" onclick="clearDraw()">Çizimi Temizle</p>
</div>

<div id="success-card">
    <div style="background: var(--card); padding: 40px; border-radius: 30px; border: 3px solid var(--accent); text-align: center;">
        <h2 style="color: var(--accent); font-size: 2.5rem;">BİNGO!</h2>
        <p id="success-msg" style="margin-bottom: 25px;"></p>
        <button class="btn-check" onclick="nextLevel()">SIRADAKİ ➔</button>
    </div>
</div>

<script>
    let currentMode = 1;
    let levels = [], currentIdx = 0, classifier, inputRefs = [], currentDoodleLabel = "", isDrawing = false;

    const emojiCheckLib = { "apple": ["🍎", "🍏"], "hand": ["🖐️", "✋", "👋", "✍️"], "car": ["🚗", "🚓"] };

    async function setupML() {
        classifier = await ml5.imageClassifier('DoodleNet', () => { document.getElementById('status').innerText = "AI HAZIR"; });
        loadLevels();
    }

    async function loadLevels() {
        try {
            const res = await fetch('levels.json');
            levels = await res.json();
        } catch (e) { 
            // Dosya yoksa örnek veri
            levels = [{ word: "ELMA", mode:1, segments: [{type: "draw", label: "hand"}, {type: "text", value: "ma"}] }];
        }
    }

    function showModeSelection() { document.getElementById('main-menu').style.display = 'none'; document.getElementById('mode-selection').style.display = 'flex'; }
    function goToMenu() { location.reload(); }

    function startLevel(mode) {
        currentMode = mode;
        document.getElementById('mode-selection').style.display = 'none';
        document.getElementById('game-container').style.display = 'block';
        document.getElementById('clear-btn').style.visibility = (mode === 1) ? 'visible' : 'hidden';
        initGame();
    }

    function initGame() {
        // Seçilen moda uygun ilk seviyeyi bul
        const modeLevels = levels.filter(l => l.mode === currentMode);
        if(modeLevels.length === 0) { alert("Bu modda henüz seviye yok!"); return goToMenu(); }
        
        const data = modeLevels[currentIdx % modeLevels.length];
        const row = document.getElementById('game-row');
        document.getElementById('target').innerText = data.word;
        row.innerHTML = '';
        inputRefs = [];

        data.segments.forEach(seg => {
            if (seg.type === "draw" || seg.type === "emoji") {
                currentDoodleLabel = seg.label;
                const box = document.createElement('div');
                if (currentMode === 1) {
                    box.className = 'canvas-box';
                    box.innerHTML = `<canvas id="cvs"></canvas>`;
                    row.appendChild(box);
                    setupCanvas();
                } else {
                    box.className = 'emoji-input-box';
                    box.innerHTML = `<input type="text" id="emoji-in" placeholder="😃" oninput="limitOneEmoji(this)">`;
                    row.appendChild(box);
                }
            } else if (seg.type === "text" || seg.type === "number") {
                seg.value.split('').forEach(char => {
                    const lBox = document.createElement('div');
                    lBox.className = seg.type === "number" ? 'number-box' : 'letter-box';
                    const id = `I${inputRefs.length}`;
                    lBox.innerHTML = `<input type="text" id="${id}" maxlength="1" autocomplete="off">`;
                    row.appendChild(lBox);
                    inputRefs.push({ id, correct: char.toUpperCase() });
                });
            }
        });
    }

    function limitOneEmoji(el) { let chars = Array.from(el.value); if (chars.length > 1) el.value = chars[chars.length - 1]; }

    function setupCanvas() {
        const c = document.getElementById('cvs'); if(!c) return;
        const ctx = c.getContext('2d'); const rect = c.parentElement.getBoundingClientRect();
        c.width = rect.width * 2; c.height = rect.height * 2;
        ctx.fillStyle = "white"; ctx.fillRect(0,0,c.width,c.height);
        ctx.strokeStyle = "black"; ctx.lineWidth = 10; ctx.lineCap = "round";
        const getPos = (e) => {
            const r = c.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: (clientX - r.left) * (c.width / r.width), y: (clientY - r.top) * (c.height / r.height) };
        };
        c.onmousedown = c.ontouchstart = (e) => { isDrawing = true; ctx.beginPath(); const p = getPos(e); ctx.moveTo(p.x, p.y); };
        c.onmousemove = c.ontouchmove = (e) => { if(!isDrawing) return; const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); };
        window.onmouseup = window.ontouchend = () => isDrawing = false;
    }

    async function check() {
        let inputsOk = inputRefs.every(ref => document.getElementById(ref.id).value.toUpperCase() === ref.correct);
        if (!inputsOk) return alert("Hatalı giriş yaptın canısı!");

        if (currentMode === 1) {
            const results = await classifier.classify(document.getElementById('cvs'));
            if (results.slice(0, 3).some(r => r.label === currentDoodleLabel)) showSuccess();
            else alert("AI çizimi tanıyamadı!");
        } else if (currentMode === 2) {
            const val = document.getElementById('emoji-in').value;
            if ((emojiCheckLib[currentDoodleLabel] || []).includes(val)) showSuccess();
            else alert("Yanlış emoji!");
        } else {
            showSuccess(); // Sayı modunda harfler/rakamlar doğruysa yeterli
        }
    }

    function showSuccess() {
        confetti({ particleCount: 200, spread: 70, origin: { y: 0.6 } });
        document.getElementById('success-msg').innerText = "Tebrikler!";
        document.getElementById('success-card').style.display = 'flex';
    }

    function nextLevel() {
        document.getElementById('success-card').style.display = 'none';
        currentIdx++;
        initGame();
    }

    function clearDraw() { const c = document.getElementById('cvs'); if(c) c.getContext('2d').fillRect(0,0,c.width,c.height); }

    setupML();
</script>
</body>
</html>
