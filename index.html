<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Resimli Kelime Tamamlama</title>
    <!-- 1. ML5.JS KÜTÜPHANESİNİ EKLEDİK -->
    <script src="https://unpkg.com/ml5@latest/dist/ml5.min.js"></script>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #00d2d3;
            --primary: #6c5ce7;
            --hint: #ff9f43;
        }

        * { box-sizing: border-box; touch-action: none; font-family: 'Arial Rounded MT Bold', sans-serif; }
        body { margin: 0; background: var(--bg); color: #fff; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }

        #game-container {
            width: 92%; max-width: 420px; background: var(--card);
            padding: 25px; border-radius: 45px; text-align: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
        }

        .header { display: flex; justify-content: space-between; font-size: 0.8rem; color: var(--primary); font-weight: bold; margin-bottom: 10px; }
        .target-word { font-size: 3.2rem; font-weight: 900; color: var(--accent); margin: 0; text-transform: uppercase; letter-spacing: 2px; }
        .instruction { font-size: 1rem; color: #94a3b8; margin: 10px 0 20px 0; font-weight: bold; }

        .game-row {
            display: flex; flex-direction: row; justify-content: center;
            align-items: flex-end; gap: 10px; margin-bottom: 25px;
        }

        .canvas-box {
            background: #fff; border: 4px solid var(--primary);
            border-radius: 20px; width: 120px; height: 100px;
            position: relative; flex-shrink: 0;
        }
        canvas { width: 100%; height: 100%; border-radius: 16px; cursor: crosshair; }

        .letter-box {
            background: #fff; width: 60px; height: 90px;
            border-radius: 20px; display: flex; flex-direction: column;
            justify-content: center; align-items: center; box-shadow: 0 6px 0 #cbd5e1;
        }

        .letter-box input {
            width: 80%; border: none; border-bottom: 3px solid var(--primary);
            text-align: center; font-size: 1.8rem; font-weight: bold;
            color: #2d3436; outline: none; background: transparent;
        }

        .box-label { font-size: 0.6rem; color: #636e72; margin-top: 5px; font-weight: bold; }

        .btn-check {
            width: 100%; padding: 20px; background: var(--primary); color: white;
            border: none; border-radius: 22px; font-size: 1.5rem; font-weight: 900;
            cursor: pointer; box-shadow: 0 8px 0 #4834d4;
        }

        .hint-btn {
            margin-top: 15px; background: rgba(255,159,67,0.1);
            border: 1px dashed var(--hint); padding: 10px; border-radius: 15px;
            color: var(--hint); font-size: 0.8rem; cursor: pointer;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div class="header"><span id="status">YÜKLENİYOR...</span><span>∞</span></div>
    <div class="target-word" id="target">ELMA</div>
    <div class="instruction">Resmi çiz, harflerle tamamla!</div>

    <div class="game-row" id="game-row"></div>

    <button class="btn-check" onclick="check()">KONTROL ET</button>
    <div class="hint-btn" onclick="playAd()">📺 Reklam İzle & İpucu Al</div>
    <p style="color:#64748b; font-size:0.7rem; margin-top:15px; cursor:pointer;" onclick="clearDraw()">Çizimi Temizle</p>
</div>

<div id="ad-view" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:99; display:none; align-items:center; justify-content:center; flex-direction:column;">
    <p>Reklam İzleniyor... <span id="ad-sec">3</span></p>
</div>

<script>
    // doodleLabel: ml5.js'in tanıyacağı İngilizce karşılık
    const levels = [
        { word: "ELMA", drawPart: "EL", doodleLabel: "hand", letters: ["M", "A"] },
        { word: "GÜNEŞ", drawPart: "GÜN", doodleLabel: "sun", letters: ["E", "Ş"] },
        { word: "EVREN", drawPart: "EV", doodleLabel: "house", letters: ["R", "E", "N"] }
    ];

    let current = 0;
    let isDrawing = false;
    let classifier;

    // 2. MODELİ BAŞLAT
    function setupML() {
        classifier = ml5.imageClassifier('DoodleNet', () => {
            document.getElementById('status').innerText = "HAZIR";
        });
    }

    function init() {
        const data = levels[current];
        const row = document.getElementById('game-row');
        document.getElementById('target').innerText = data.word;
        row.innerHTML = '';

        const cBox = document.createElement('div');
        cBox.className = 'canvas-box';
        cBox.innerHTML = `<canvas id="cvs"></canvas><div style="position:absolute; bottom:5px; width:100%; font-size:8px; color:#aaa;">"${data.drawPart}" ÇİZ</div>`;
        row.appendChild(cBox);

        data.letters.forEach((char, i) => {
            const lBox = document.createElement('div');
            lBox.className = 'letter-box';
            lBox.innerHTML = `<input type="text" id="L${i}" maxlength="1" autocomplete="off"><span class="box-label">HARF</span>`;
            row.appendChild(lBox);
        });

        setupCanvas();
    }

    function setupCanvas() {
        const c = document.getElementById('cvs');
        const ctx = c.getContext('2d');
        c.width = 120; c.height = 100;
        ctx.fillStyle = "white"; ctx.fillRect(0,0,c.width,c.height); // Arkaplanı beyaz yap (AI için önemli)
        ctx.strokeStyle = "#000"; ctx.lineWidth = 6; ctx.lineCap = "round";

        const pos = (e) => {
            const r = c.getBoundingClientRect();
            const x = (e.touches ? e.touches[0].clientX : e.clientX) - r.left;
            const y = (e.touches ? e.touches[0].clientY : e.clientY) - r.top;
            return {x, y};
        };

        c.onmousedown = c.ontouchstart = (e) => { isDrawing = true; ctx.beginPath(); const p = pos(e); ctx.moveTo(p.x, p.y); };
        c.onmousemove = c.ontouchmove = (e) => { if(!isDrawing) return; const p = pos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); };
        window.onmouseup = window.ontouchend = () => isDrawing = false;
    }

    // 3. KONTROL ETME (HEM HARF HEM ÇİZİM)
    function check() {
        const data = levels[current];
        const canvas = document.getElementById('cvs');

        // Önce harfleri kontrol et
        let lettersCorrect = true;
        data.letters.forEach((char, i) => {
            if(document.getElementById(`L${i}`).value.toUpperCase() !== char) lettersCorrect = false;
        });

        if(!lettersCorrect) {
            alert("Harfler hatalı!");
            return;
        }

        // Çizimi AI ile kontrol et
        classifier.classify(canvas, (err, results) => {
            if (err) return;
            
            // AI'nın en yüksek olasılıklı tahmini hedeflenen kelime mi?
            const topResult = results[0].label;
            const targetLabel = data.doodleLabel;

            // Debug için konsola ne gördüğünü yazar:
            console.log("AI Tahmini:", topResult, "Beklenen:", targetLabel);

            if (topResult === targetLabel) {
                alert("Harika! Çizim ve kelime doğru.");
                current = (current + 1) % levels.length;
                init();
            } else {
                alert("Çizimin şuna benziyor: " + results[0].label + ". Lütfen daha net bir " + data.drawPart + " çiz!");
            }
        });
    }

    function clearDraw() { 
        const c = document.getElementById('cvs');
        const ctx = c.getContext('2d');
        ctx.fillStyle = "white";
        ctx.fillRect(0,0,c.width,c.height);
    }

    function playAd() {
        const ad = document.getElementById('ad-view');
        ad.style.display = 'flex';
        let count = 3;
        const t = setInterval(() => {
            count--; document.getElementById('ad-sec').innerText = count;
            if(count <= 0) { clearInterval(t); ad.style.display = 'none'; getHint(); }
        }, 1000);
    }

    function getHint() {
        const data = levels[current];
        for(let i=0; i<data.letters.length; i++) {
            const input = document.getElementById(`L${i}`);
            if(input.value.toUpperCase() !== data.letters[i]) {
                input.value = data.letters[i];
                break;
            }
        }
    }

    setupML();
    init();
</script>
</body>
</html>
