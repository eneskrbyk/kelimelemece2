<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kelimelemece!</title>
    <script src="https://unpkg.com/ml5@latest/dist/ml5.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #00d2d3;
            --primary: #6c5ce7;
            --hint: #ff9f43;
        }

        * { box-sizing: border-box; touch-action: none; font-family: 'Arial Rounded MT Bold', sans-serif; }
        body { margin: 0; background: var(--bg); color: #fff; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }

        /* ANA MENÜ */
        #main-menu {
            position: fixed; inset: 0; background: var(--bg);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 1000; padding: 20px; text-align: center;
        }

        /* OYUN ALANI */
        #game-container {
            width: 92%; max-width: 480px; background: var(--card);
            padding: 25px; border-radius: 45px; text-align: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
            display: none;
            position: relative;
        }

        /* Menüye Dönüş Butonu (Sol Üst) */
        .home-btn {
            position: absolute; top: 20px; left: 20px;
            background: rgba(255,255,255,0.1); border: none;
            color: #fff; padding: 8px 12px; border-radius: 12px;
            cursor: pointer; font-size: 0.7rem; font-weight: bold;
        }

        .target-word { font-size: 3rem; font-weight: 900; color: var(--accent); margin: 0; text-transform: uppercase; letter-spacing: 2px; }
        
        .game-row {
            display: flex; flex-direction: row; justify-content: center;
            align-items: center; gap: 10px; margin-bottom: 25px; flex-wrap: wrap;
        }

        .fade-anim { animation: fade 0.6s ease-out; }
        @keyframes fade {
            0% { opacity: 0; transform: scale(0.9); }
            100% { opacity: 1; transform: scale(1); }
        }

        /* Karelerin Eşitlenmesi */
        .canvas-box, .letter-box {
            width: 80px; height: 80px;
            border-radius: 20px; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 5px 0 rgba(0,0,0,0.2);
        }

        .canvas-box { background: #fff; border: 4px solid var(--primary); position: relative; overflow: hidden; }
        canvas { width: 100%; height: 100%; cursor: crosshair; }

        .letter-box { background: #fff; }
        .letter-box input {
            width: 90%; border: none; border-bottom: 3px solid var(--primary);
            text-align: center; font-size: 1.8rem; font-weight: bold;
            color: #2d3436; outline: none; background: transparent;
        }

        .btn-check {
            width: 100%; padding: 20px; background: var(--primary); color: white;
            border: none; border-radius: 22px; font-size: 1.5rem; font-weight: 900;
            cursor: pointer; box-shadow: 0 8px 0 #4834d4; transition: 0.2s;
        }

        /* BAŞARI KARTI */
        #success-card {
            position: fixed; inset: 0; background: rgba(15, 23, 42, 0.95);
            display: none; flex-direction: column; align-items: center; justify-content: center;
            z-index: 2000; text-align: center;
            animation: fadeIn 0.5s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; background: rgba(15, 23, 42, 0); }
            to { opacity: 1; background: rgba(15, 23, 42, 0.95); }
        }
        .card-content {
            background: var(--card); padding: 40px; border-radius: 30px;
            border: 3px solid var(--accent); box-shadow: 0 0 30px rgba(0, 210, 211, 0.3);
        }
    </style>
</head>
<body>

<div id="main-menu">
    <h1 style="color: var(--accent); font-size: 2.5rem; margin-bottom: 30px;">Kelimelemece!</h1>
    <div style="width: 100%; max-width: 300px;">
        <button class="btn-check" onclick="startGame()">OYUNA BAŞLA</button>
        <button class="btn-check" style="background: #475569; box-shadow: 0 8px 0 #1e293b; margin-top: 15px;">AYARLAR</button>
    </div>
</div>

<div id="success-card">
    <div class="card-content">
        <h2 style="color: var(--accent); font-size: 2.5rem; margin-bottom: 10px;">BİNGO!</h2>
        <p id="success-msg" style="font-size: 1.2rem; margin-bottom: 25px;"></p>
        <button class="btn-check" onclick="nextLevel()">SIRADAKİ KELİME ➔</button>
    </div>
</div>

<div id="game-container">
    <button class="home-btn" onclick="goToMenu()">🏠 Menü</button>
    <div style="display: flex; justify-content: flex-end; font-size: 0.8rem; color: var(--primary); font-weight: bold; margin-bottom: 10px;">
        <span id="status">YÜKLENİYOR...</span>
    </div>
    <div class="target-word" id="target">...</div>
    <p style="color: #94a3b8; font-weight: bold; margin: 10px 0 20px 0;">aşağıdaki kutulara bu kelimeyi sığdırabilir misin?</p>
    <div class="game-row" id="game-row"></div>
    <button class="btn-check" onclick="check()">KONTROL ET</button>
    <div style="margin-top: 15px; background: rgba(255,159,67,0.1); border: 1px dashed var(--hint); padding: 10px; border-radius: 15px; color: var(--hint); cursor: pointer;" onclick="playAd()">📺 İpucu Al</div>
    <p style="color:#64748b; font-size:0.7rem; margin-top:15px; cursor:pointer;" onclick="clearDraw()">Çizimi Temizle</p>
</div>

<script>
    let levels = [], current = 0, classifier, inputRefs = [], currentDoodleLabel = "", isDrawing = false;

    async function setupML() {
        classifier = await ml5.imageClassifier('DoodleNet', () => {
            document.getElementById('status').innerText = "AI HAZIR";
            loadLevels();
        });
    }

    async function loadLevels() {
        try {
            const res = await fetch('levels.json');
            levels = await res.json();
        } catch (e) { console.error("JSON Hatası:", e); }
    }

    function startGame() {
        document.getElementById('main-menu').style.display = 'none';
        document.getElementById('game-container').style.display = 'block';
        init();
    }

    function goToMenu() {
        document.getElementById('game-container').style.display = 'none';
        document.getElementById('main-menu').style.display = 'flex';
    }

    function init() {
        if (levels.length === 0) return;
        const data = levels[current];
        const row = document.getElementById('game-row');
        row.classList.remove('fade-anim');
        void row.offsetWidth; 
        row.classList.add('fade-anim');

        document.getElementById('target').innerText = data.word;
        row.innerHTML = '';
        inputRefs = [];

        data.segments.forEach(seg => {
            if (seg.type === "draw") {
                const cBox = document.createElement('div');
                cBox.className = 'canvas-box';
                // İpucu yazısı (seg.value) kaldırıldı
                cBox.innerHTML = `<canvas id="cvs"></canvas>`;
                row.appendChild(cBox);
                currentDoodleLabel = seg.label;
                setupCanvas();
            } else {
                seg.value.split('').forEach(char => {
                    const lBox = document.createElement('div');
                    lBox.className = 'letter-box';
                    const id = `L${inputRefs.length}`;
                    lBox.innerHTML = `<input type="text" id="${id}" maxlength="1" autocomplete="off">`;
                    row.appendChild(lBox);
                    inputRefs.push({ id, correct: char.toUpperCase() });
                });
            }
        });
    }

    function setupCanvas() {
        const c = document.getElementById('cvs');
        const ctx = c.getContext('2d');
        c.width = 280; c.height = 280;
        ctx.fillStyle = "white"; ctx.fillRect(0,0,280,280);
        ctx.strokeStyle = "black"; ctx.lineWidth = 14; ctx.lineCap = "round";

        const getPos = (e) => {
            const r = c.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: (clientX - r.left) * (280/r.width), y: (clientY - r.top) * (280/r.height) };
        };

        c.onmousedown = c.ontouchstart = (e) => { isDrawing = true; ctx.beginPath(); const p = getPos(e); ctx.moveTo(p.x, p.y); if(e.cancelable) e.preventDefault(); };
        c.onmousemove = c.ontouchmove = (e) => { if(!isDrawing) return; const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); };
        window.onmouseup = window.ontouchend = () => isDrawing = false;
    }

    async function check() {
        if (!classifier) return;
        let lettersOk = inputRefs.every(ref => document.getElementById(ref.id).value.toUpperCase() === ref.correct);
        if (!lettersOk) { alert("Harfler Yanlış!"); return; }

        const results = await classifier.classify(document.getElementById('cvs'));
        const drawingOk = results.slice(0, 3).some(r => r.label === currentDoodleLabel);

        if (drawingOk) {
            confetti({ particleCount: 200, spread: 80, origin: { y: 0.6 } });
            setTimeout(() => {
                document.getElementById('success-msg').innerText = `"${levels[current].word}" kelimesini bildin!`;
                document.getElementById('success-card').style.display = 'flex';
                
                var end = Date.now() + 2000;
                (function frame() {
                    confetti({ particleCount: 2, angle: 60, spread: 55, origin: { x: 0 }, colors: ['#00d2d3', '#6c5ce7'] });
                    confetti({ particleCount: 2, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#00d2d3', '#6c5ce7'] });
                    if (Date.now() < end) requestAnimationFrame(frame);
                }());
            }, 1500);
        } else { alert("Yanlış Çizim!"); }
    }

    function nextLevel() {
        document.getElementById('success-card').style.display = 'none';
        current = (current + 1) % levels.length;
        init();
    }

    function clearDraw() {
        const c = document.getElementById('cvs');
        if(c) c.getContext('2d').fillRect(0,0,280,280);
    }

    function playAd() {
        for (let ref of inputRefs) {
            let el = document.getElementById(ref.id);
            if (el.value.toUpperCase() !== ref.correct) {
                el.value = ref.correct; el.style.color = "var(--hint)"; break;
            }
        }
    }

    setupML();
</script>
</body>
</html>
