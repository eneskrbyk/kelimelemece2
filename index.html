<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kelimelemece!</title>
    <script src="https://unpkg.com/ml5@latest/dist/ml5.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #00d2d3;
            --primary: #6c5ce7;
            --secondary: #ff9f43;
        }

        * { box-sizing: border-box; touch-action: none; font-family: 'Arial Rounded MT Bold', sans-serif; }
        body { margin: 0; background: var(--bg); color: #fff; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }

        /* GENEL PANEL YAPISI */
        .panel {
            position: fixed; inset: 0; background: var(--bg);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 1000; padding: 20px; text-align: center;
        }

        /* MOD SEÇİM EKRANI */
        #mode-selection { display: none; background: rgba(15, 23, 42, 0.98); }
        .mode-card {
            width: 100%; max-width: 300px; background: var(--card);
            padding: 20px; margin: 10px; border-radius: 25px;
            border: 2px solid transparent; cursor: pointer;
            transition: 0.3s;
        }
        .mode-card:hover { border-color: var(--accent); transform: translateY(-5px); }
        .mode-card h3 { margin: 0; color: var(--accent); }
        .mode-card p { font-size: 0.8rem; color: #94a3b8; margin: 5px 0 0 0; }

        /* OYUN ALANI */
        #game-container {
            width: 95%; max-width: 500px; background: var(--card);
            padding: 30px 20px; border-radius: 45px; text-align: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
            display: none; position: relative;
        }

        .home-btn {
            position: absolute; top: 20px; left: 20px;
            background: rgba(255,255,255,0.1); border: none;
            color: #fff; padding: 8px 12px; border-radius: 12px;
            cursor: pointer; font-size: 0.7rem; font-weight: bold;
        }

        .target-word { font-size: 3.5rem; font-weight: 900; color: var(--accent); margin: 0; text-transform: uppercase; letter-spacing: 2px; }
        
        .game-row {
            display: flex; flex-direction: row; justify-content: center;
            align-items: center; gap: 10px; margin: 30px 0; flex-wrap: wrap;
        }

        /* KARELER */
        .canvas-box {
            background: #fff; border: 4px solid var(--primary);
            width: 160px; height: 100px; border-radius: 20px;
            position: relative; overflow: hidden;
        }
        .letter-box {
            background: #fff; width: 65px; height: 100px;
            border-radius: 20px; display: flex; align-items: center; justify-content: center;
        }
        .letter-box input {
            width: 80%; border: none; border-bottom: 3px solid var(--primary);
            text-align: center; font-size: 2rem; font-weight: bold; color: #2d3436; outline: none;
        }

        .btn-check {
            width: 100%; max-width: 300px; padding: 20px; background: var(--primary); color: white;
            border: none; border-radius: 22px; font-size: 1.5rem; font-weight: 900;
            cursor: pointer; box-shadow: 0 8px 0 #4834d4; margin-top: 10px;
        }

        #success-card {
            position: fixed; inset: 0; background: rgba(15, 23, 42, 0.95);
            display: none; flex-direction: column; align-items: center; justify-content: center;
            z-index: 2000;
        }
    </style>
</head>
<body>

<!-- ANA MENÜ -->
<div id="main-menu" class="panel">
    <h1 style="color: var(--accent); font-size: 3rem; margin-bottom: 40px;">Kelimelemece!</h1>
    <button class="btn-check" onclick="showModeSelection()">OYUNA BAŞLA</button>
    <button class="btn-check" style="background: #475569; box-shadow: 0 8px 0 #1e293b;">AYARLAR</button>
</div>

<!-- MOD SEÇİMİ -->
<div id="mode-selection" class="panel">
    <h2 style="color: #fff; margin-bottom: 30px;">Modunu Seç Canısı</h2>
    
    <div class="mode-card" onclick="startLevel(1)">
        <h3>🎨 Çizim Modu</h3>
        <p>Eksik parçayı çiz, harfleri tamamla!</p>
    </div>

    <div class="mode-card" onclick="alert('Yakında: Emoji Modu!')">
        <h3>😍 Emoji Modu</h3>
        <p>Doğru emojiyi bul, kelimeyi kurtar!</p>
    </div>

    <div class="mode-card" onclick="alert('Yakında: Sayı Modu!')">
        <h3>🔢 Sayı Modu</h3>
        <p>Gizli sayıları harflerle birleştir!</p>
    </div>

    <button class="home-btn" style="position:static; margin-top:30px;" onclick="goToMenu()">⬅ Geri Dön</button>
</div>

<!-- OYUN ALANI -->
<div id="game-container">
    <button class="home-btn" onclick="goToMenu()">🏠 Menü</button>
    <div style="display: flex; justify-content: flex-end; font-size: 0.8rem; color: var(--primary); font-weight: bold; margin-bottom: 10px;">
        <span id="status">AI YÜKLENİYOR...</span>
    </div>
    
    <div class="target-word" id="target">...</div>
    <p style="color: #94a3b8; font-weight: bold; margin: 10px 0 20px 0;">aşağıdaki kutulara bu kelimeyi sığdırabilir misin?</p>
    
    <div class="game-row" id="game-row"></div>
    
    <button class="btn-check" onclick="check()">KONTROL ET</button>
    <p style="color:#64748b; font-size:0.7rem; margin-top:20px; cursor:pointer;" onclick="clearDraw()">Çizimi Temizle</p>
</div>

<!-- BAŞARI EKRANI -->
<div id="success-card">
    <div style="background: var(--card); padding: 40px; border-radius: 30px; border: 3px solid var(--accent); text-align: center;">
        <h2 style="color: var(--accent); font-size: 2.5rem;">BİNGO!</h2>
        <p id="success-msg" style="margin-bottom: 25px;"></p>
        <button class="btn-check" onclick="nextLevel()">SIRADAKİ ➔</button>
    </div>
</div>

<script>
    let currentMode = 1;
    let levels = [], currentIdx = 0, classifier, inputRefs = [], currentDoodleLabel = "", isDrawing = false;

    async function setupML() {
        classifier = await ml5.imageClassifier('DoodleNet', () => {
            document.getElementById('status').innerText = "AI HAZIR";
        });
        // Örnek seviye datası (Normalde levels.json'dan gelir)
        levels = [{ word: "ELMA", segments: [{type: "draw", label: "hand"}, {type: "text", value: "ma"}] }];
    }

    function showModeSelection() {
        document.getElementById('main-menu').style.display = 'none';
        document.getElementById('mode-selection').style.display = 'flex';
    }

    function startLevel(mode) {
        currentMode = mode;
        document.getElementById('mode-selection').style.display = 'none';
        document.getElementById('game-container').style.display = 'block';
        initGame();
    }

    function goToMenu() {
        document.getElementById('game-container').style.display = 'none';
        document.getElementById('mode-selection').style.display = 'none';
        document.getElementById('main-menu').style.display = 'flex';
    }

    function initGame() {
        const data = levels[currentIdx];
        const row = document.getElementById('game-row');
        document.getElementById('target').innerText = data.word;
        row.innerHTML = '';
        inputRefs = [];

        data.segments.forEach(seg => {
            if (seg.type === "draw") {
                const cBox = document.createElement('div');
                cBox.className = 'canvas-box';
                cBox.innerHTML = `<canvas id="cvs"></canvas>`;
                row.appendChild(cBox);
                currentDoodleLabel = seg.label;
                setupCanvas();
            } else {
                seg.value.split('').forEach(char => {
                    const lBox = document.createElement('div');
                    lBox.className = 'letter-box';
                    const id = `L${inputRefs.length}`;
                    lBox.innerHTML = `<input type="text" id="${id}" maxlength="1" autocomplete="off">`;
                    row.appendChild(lBox);
                    inputRefs.push({ id, correct: char.toUpperCase() });
                });
            }
        });
    }

    function setupCanvas() {
        const c = document.getElementById('cvs');
        if(!c) return;
        const ctx = c.getContext('2d');
        const rect = c.parentElement.getBoundingClientRect();
        c.width = rect.width * 2; c.height = rect.height * 2;
        ctx.fillStyle = "white"; ctx.fillRect(0,0,c.width,c.height);
        ctx.strokeStyle = "black"; ctx.lineWidth = 10; ctx.lineCap = "round";

        const getPos = (e) => {
            const r = c.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: (clientX - r.left) * (c.width / r.width), y: (clientY - r.top) * (c.height / r.height) };
        };

        c.onmousedown = c.ontouchstart = (e) => { isDrawing = true; ctx.beginPath(); const p = getPos(e); ctx.moveTo(p.x, p.y); };
        c.onmousemove = c.ontouchmove = (e) => { if(!isDrawing) return; const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); };
        window.onmouseup = window.ontouchend = () => isDrawing = false;
    }

    async function check() {
        if (currentMode === 1) {
            let lettersOk = inputRefs.every(ref => document.getElementById(ref.id).value.toUpperCase() === ref.correct);
            if (!lettersOk) return alert("Harfler Yanlış!");

            const res = await classifier.classify(document.getElementById('cvs'));
            if (res.slice(0, 3).some(r => r.label === currentDoodleLabel)) {
                confetti({ particleCount: 150 });
                document.getElementById('success-msg').innerText = "Harika bir çizim!";
                document.getElementById('success-card').style.display = 'flex';
            } else { alert("AI bu çizimi tanıyamadı, tekrar dene!"); }
        }
    }

    function clearDraw() {
        const c = document.getElementById('cvs');
        if(c) c.getContext('2d').fillRect(0,0,c.width,c.height);
    }

    setupML();
</script>
</body>
</html>
