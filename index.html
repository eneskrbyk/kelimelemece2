<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kelimelemece!</title>
    <script src="https://unpkg.com/ml5@latest/dist/ml5.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #00d2d3; --primary: #6c5ce7; --secondary: #ff9f43; }
        * { box-sizing: border-box; touch-action: none; font-family: 'Arial Rounded MT Bold', sans-serif; }
        body { margin: 0; background: var(--bg); color: #fff; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .panel { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; padding: 20px; text-align: center; }
        #mode-selection { display: none; background: rgba(15, 23, 42, 0.98); }
        .mode-card { width: 100%; max-width: 300px; background: var(--card); padding: 20px; margin: 10px; border-radius: 25px; border: 2px solid transparent; cursor: pointer; transition: 0.3s; }
        .mode-card:hover { border-color: var(--accent); transform: translateY(-5px); }
        .mode-card h3 { margin: 0; color: var(--accent); }
        #game-container { width: 95%; max-width: 520px; background: var(--card); padding: 30px 20px; border-radius: 45px; text-align: center; display: none; position: relative; }
        .home-btn { position: absolute; top: 20px; left: 20px; background: rgba(255,255,255,0.1); border: none; color: #fff; padding: 8px 12px; border-radius: 12px; cursor: pointer; font-size: 0.7rem; font-weight: bold; }
        .target-word { font-size: 3.5rem; font-weight: 900; color: var(--accent); margin: 0; text-transform: uppercase; letter-spacing: 2px; }
        .game-row { display: flex; flex-direction: row; justify-content: center; align-items: center; gap: 8px; margin: 30px 0; flex-wrap: wrap; }
        .canvas-box, .emoji-input-box { background: #fff; border: 4px solid var(--primary); width: 150px; height: 100px; border-radius: 20px; position: relative; overflow: hidden; }
        .emoji-input-box { border-color: var(--accent); display: flex; align-items: center; justify-content: center; }
        .emoji-input-box input { width: 100%; background: transparent; border: none; text-align: center; font-size: 3.5rem; outline: none; color: #000; }
        .letter-box, .number-box { background: #fff; width: 60px; height: 90px; border-radius: 18px; display: flex; align-items: center; justify-content: center; box-shadow: 0 5px 0 rgba(0,0,0,0.2); }
        .number-box { border: 3px solid var(--secondary); }
        .letter-box input, .number-box input { width: 85%; border: none; border-bottom: 3px solid var(--primary); text-align: center; font-size: 1.8rem; font-weight: bold; color: #2d3436; outline: none; }
        .number-box input { border-bottom-color: var(--secondary); color: var(--secondary); }
        .btn-check { width: 100%; max-width: 300px; padding: 20px; background: var(--primary); color: white; border: none; border-radius: 22px; font-size: 1.5rem; font-weight: 900; cursor: pointer; box-shadow: 0 8px 0 #4834d4; }
        #success-card { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.95); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 2000; }
        canvas { width: 100%; height: 100%; cursor: crosshair; }
    </style>
</head>
<body>

<div id="main-menu" class="panel">
    <h1 style="color: var(--accent); font-size: 3rem; margin-bottom: 40px;">Kelimelemece!</h1>
    <button class="btn-check" onclick="showModeSelection()">OYUNA BAŞLA</button>
</div>

<div id="mode-selection" class="panel">
    <h2 style="color: #fff; margin-bottom: 30px;">Modunu Seç</h2>
    <div class="mode-card" onclick="startLevel(1)"><h3>🎨 Çizim Modu</h3></div>
    <div class="mode-card" onclick="startLevel(2)"><h3>😍 Emoji Modu</h3></div>
    <div class="mode-card" onclick="startLevel(3)"><h3>🔢 Sayı Modu</h3></div>
    <button class="home-btn" style="position:static; margin-top:30px;" onclick="goToMenu()">⬅ Geri Dön</button>
</div>

<div id="game-container">
    <button class="home-btn" onclick="goToMenu()">🏠 Menü</button>
    <div style="display: flex; justify-content: flex-end; font-size: 0.7rem; color: var(--primary); font-weight: bold; margin-bottom: 5px;">
        <span id="status">YÜKLENİYOR...</span>
    </div>
    <div class="target-word" id="target">...</div>
    <p style="color: #94a3b8; font-weight: bold; margin: 10px 0 20px 0;">aşağıdaki kutulara bu kelimeyi sığdırabilir misin?</p>
    <div class="game-row" id="game-row"></div>
    <button class="btn-check" onclick="check()">KONTROL ET</button>
    <p id="clear-btn" style="color:#64748b; font-size:0.7rem; margin-top:15px; cursor:pointer;" onclick="clearDraw()">Temizle</p>
</div>

<div id="success-card">
    <div style="background: var(--card); padding: 40px; border-radius: 30px; border: 3px solid var(--accent); text-align: center;">
        <h2 style="color: var(--accent); font-size: 2.5rem;">BİNGO!</h2>
        <button class="btn-check" onclick="nextLevel()">SIRADAKİ ➔</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
